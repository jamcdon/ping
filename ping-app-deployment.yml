apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-app-deployment
  labels:
    app: ping-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ping-app
  template:
    metadata:
      labels:
        app: ping-app
    spec:
      containers:
      - name: ping-app
        image: jamcdon/ping_app:latest
        ports:
        - containerPort: 8080
        env:
        - name: APIKEY
          valueFrom:
            secretKeyRef:
              name: ping-secrets
              key: APIKEY
---
apiVersion: v1
kind: Service
metadata:
  name: ping-app-service
spec:
  selector:
    app: ping-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer